site_name: eitkit
site_description: A modular Python toolkit for 2-D Electrical Impedance Tomography
site_author: Abd'gafar Tunde Tiamiyu
site_url: https://abdgafartunde.github.io/eit-reconstruction-toolkit/
repo_url: https://github.com/abdgafartunde/eit-reconstruction-toolkit
repo_name: abdgafartunde/eit-reconstruction-toolkit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - User Guide:
      - Mesh: guide/mesh.md
      - Protocol: guide/protocol.md
      - Forward Solver: guide/forward.md
      - Inverse Solvers: guide/inverse.md
      - Utilities: guide/utils.md
  - API Reference:
      - eitkit.mesh: api/mesh.md
      - eitkit.protocol: api/protocol.md
      - eitkit.forward: api/forward.md
      - eitkit.inverse: api/inverse.md
      - eitkit.utils: api/utils.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
